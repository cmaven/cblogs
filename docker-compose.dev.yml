# ============================================================
# docker-compose.dev.yml: VitePress 개발 환경 (볼륨 마운트 + HMR)
# 생성일: 2026-04-08 | 수정일: 2026-04-08
# ============================================================

services:
  docs-portal:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3030:3030"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: sh -c "
      if [ ! -d /app/node_modules/vitepress ]; then
        echo '📦 node_modules 없음 — npm install 실행...' &&
        npm install;
      else
        echo '✅ node_modules 캐시 사용 — install 스킵';
      fi &&
      npm run docs:dev"
    restart: unless-stopped

volumes:
  node_modules:
